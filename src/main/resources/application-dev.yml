# ─── Perfil: dev ─────────────────────────────────────────────────────────────
# Se activa con: SPRING_PROFILES_ACTIVE=dev
# Apunta a la base de datos PostgreSQL mediante JDBC (JPA/Hibernate).
# Las credenciales se leen de variables de entorno (ej. .env o Docker).
# ─────────────────────────────────────────────────────────────────────────────

spring:
  # Indica explícitamente el modo Servlet (No reactivo)
  main:
    web-application-type: servlet

  # ─── DataSource — HikariCP para JPA y Flyway ──────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:${POSTGRES_PORT:5432}/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  # ─── JPA / Hibernate ──────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # ─── Flyway ───────────────────────────────────────────────────────────────
  # Al usar MVC/JDBC, Flyway detecta automáticamente el datasource de arriba.
  # Solo necesitas definir la URL si quieres usar un usuario distinto para migraciones.
  flyway:
    enabled: true
    baseline-on-migrate: true

gresk:
  images:
    default-url: "https://res.cloudinary.com/dzfgoh6hu/image/upload/ar_1:1,c_crop,g_auto:face,w_300/r_max/co_rgb:68D2E7,e_outline:outer:15/main-sample.png"
    asset-url-template: "https://res.cloudinary.com/dzfgoh6hu/image/upload/ar_1:1,c_crop,g_auto:face,w_300/r_max/co_rgb:68D2E7,e_outline:outer:15/{assetId}"

# ─── Actuator ────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
      # Muestra el estado del DataSource JDBC y el espacio en disco.

# ─── Logging ──────────────────────────────────────────────────────────────────
  logging:
    level:
      root: INFO
      com.gresk: DEBUG
      # Logs de seguridad para Spring Security (filtros de Servlet)
      org.springframework.security: DEBUG
      # Muestra las queries SQL generadas por Hibernate
      org.hibernate.SQL: DEBUG
      org.hibernate.type.descriptor.sql.BasicBinder: TRACE