spring:
  application:
    name: gresk-backend

  # CONFIGURACIÓN CRUCIAL: Debe estar al mismo nivel que 'application'
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/gresk_db}
    username: ${SPRING_DATASOURCE_USERNAME:admin}
    password: ${SPRING_DATASOURCE_PASSWORD:secretpass}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    show-sql: false

  main:
    web-application-type: servlet

# --- SECCIONES FUERA DE 'SPRING' ---

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

jwt:
  secret: ${JWT_SECRET:Z3Jlc2stYmFja2VuZC1zZWNyZXQta2V5LXdpdGgtZW5vdWdoLWxlbmd0aC1mb3Itc2VjdXJpdHktMjAyNi1nZW1pbmk=}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html