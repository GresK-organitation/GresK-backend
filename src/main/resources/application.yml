spring:
  application:
    name: gresk-backend
    # El nombre de la aplicación es global: lo usan Actuator (/actuator/info),
    # los logs y herramientas de monitorización. No cambia entre entornos.

  # ─── JPA / Hibernate ─────────────────────────────────────────────────────
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    # Le dice a Hibernate qué "dialecto" SQL usar. PostgreSQL tiene extensiones
    # propias (ej. tipos JSONB, arrays) que no existen en MySQL o H2. Sin esto,
    # Hibernate generaría SQL genérico que podría fallar con features específicas.
    hibernate:
      ddl-auto: validate
      # validate: Hibernate SOLO comprueba que las entidades Java tienen su tabla
      # correspondiente en la BD. Flyway es el único responsable de crear/alterar
      # el esquema. Nunca uses 'create' o 'update' en un proyecto real.
    open-in-view: false
    # En una API REST no hay "vista" que renderizar, por lo que mantener la sesión
    # de Hibernate abierta durante todo el ciclo HTTP es innecesario y costoso.

  # ─── Flyway ──────────────────────────────────────────────────────────────
  flyway:
    enabled: true
    # Activa la integración automática de Flyway con Spring Boot.
    # Al arrancar, Spring Boot ejecutará Flyway ANTES de que Hibernate valide
    # el esquema, garantizando que las tablas ya existen cuando Hibernate las busca.
    locations: classpath:db/migration
    # Classpath apunta a src/main/resources. Flyway buscará los scripts SQL en
    # src/main/resources/db/migration/.
    # Patrón de nombre obligatorio: V{versión}__{descripción}.sql
    #   V1__init.sql → primera migración
    #   V2__add_users_table.sql → segunda migración
    # El doble guión (__) separa la versión de la descripción.

  # ─── Datasource ──────────────────────────────────────────────────────────
  # La configuración de la base de datos es específica de cada entorno.
  # Se define en el perfil correspondiente:
  #   · application-dev.yml  → PostgreSQL Docker local
  #   · application-test.yml → sin BD (H2/Testcontainers en el futuro)
  #   · producción           → variables de entorno inyectadas por el sistema

# ─── Spring Boot Actuator ────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
  info:
    env:
      enabled: true

# ─── Info endpoint metadata ──────────────────────────────────────────────────
info:
  app:
    name: GresK Backend
    version: 0.0.1-SNAPSHOT
    description: GresK application REST API
    java-version: "@java.version@"

# ─── SpringDoc / Swagger UI ──────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true
    operations-sorter: alpha
    tags-sorter: alpha
  show-actuator: false
