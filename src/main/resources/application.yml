spring:
  application:
    name: gresk-backend
    # El nombre de la aplicación es global: lo usan Actuator (/actuator/info),
    # los logs y herramientas de monitorización. No cambia entre entornos.

  # ─── Flyway ──────────────────────────────────────────────────────────────
  flyway:
    enabled: true
    # Flyway es síncrono (JDBC). Spring Boot lo ejecuta durante el arranque,
    # ANTES de que la app empiece a aceptar peticiones reactivas.
    # Aunque la app usa R2DBC, Flyway necesita su propia URL JDBC (ver dev/prod).
    locations: classpath:db/migration
    # Patrón de nombre: V{versión}__{descripción}.sql
    #   V1__init.sql, V2__create_promoters.sql, etc.

  # ─── JPA / Hibernate ─────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: none   # Flyway gestiona el esquema; Hibernate nunca toca DDL
    open-in-view: false

  # ─── Datasource / Flyway (JDBC) ──────────────────────────────────────────
  # La configuración de conexión es específica de cada entorno.
  # Se define en el perfil correspondiente:
  #   · application-dev.yml  → datasource: + flyway JDBC URL (migraciones)
  #   · application-test.yml → sin BD (datasource y Flyway excluidos)
  #   · producción           → variables de entorno inyectadas por el sistema

# ─── Spring Boot Actuator ────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
  info:
    env:
      enabled: true

# ─── Info endpoint metadata ──────────────────────────────────────────────────
info:
  app:
    name: GresK Backend
    version: 0.0.1-SNAPSHOT
    description: GresK application REST API
    java-version: "@java.version@"

# ─── JWT ─────────────────────────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET}
  # Clave secreta en Base64, mínimo 256 bits para HS256.
  # Generar con: openssl rand -base64 64
  # Nunca hardcodeada. Nunca en git. Solo en variables de entorno o secretos del sistema.
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  # 86_400_000 ms = 24 horas. Configurable por entorno sin recompilar.

# ─── SpringDoc / Swagger UI ──────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true
    operations-sorter: alpha
    tags-sorter: alpha
  show-actuator: false
