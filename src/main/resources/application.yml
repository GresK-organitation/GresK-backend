spring:
  application:
    name: gresk-backend
    # Nombre global de la aplicación para logs y Actuator.

  # ─── Flyway (JDBC) ──────────────────────────────────────────────────────────
  flyway:
    enabled: true
    # En Spring MVC, Flyway usa el DataSource principal por defecto.
    # Se ejecuta de forma síncrona al arrancar el contexto.
    locations: classpath:db/migration
    baseline-on-migrate: true
    # Patrón de nombre: V{versión}__{descripción}.sql (V1__init.sql)

  # ─── JPA / Hibernate ────────────────────────────────────────────────────────
  jpa:
    hibernate:
      # Flyway gestiona el esquema. Hibernate NO debe tocar el DDL en producción.
      # En dev puedes usar 'update', pero en el main dejamos 'none' por seguridad.
      ddl-auto: none
    open-in-view: false
    # Recomendado false para evitar el anti-patrón de consultas Lazy fuera de transacciones.
    show-sql: false

  # ─── Configuración Web (Servlet) ────────────────────────────────────────────
  main:
    web-application-type: servlet

# ─── Spring Boot Actuator ────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: never
  info:
    env:
      enabled: true

# ─── Info Metadata ───────────────────────────────────────────────────────────
info:
  app:
    name: GresK Backend
    version: 0.0.1-SNAPSHOT
    description: GresK application REST API
    java-version: "@java.version@"

# ─── JWT (Configuración Segura) ─────────────────────────────────────────────
jwt:
  # La clave secreta DEBE ser inyectada por variable de entorno (JWT_SECRET)
  secret: ${JWT_SECRET}
  # Tiempo de vida: 86.400.000 ms = 24 horas por defecto
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

# ─── SpringDoc / Swagger UI (WebMVC) ────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true
    operations-sorter: alpha
    tags-sorter: alpha
  show-actuator: false