# ─── Perfil de Configuración ─────────────────────────────────────────────────
# Si quieres que esto solo aplique a los tests, asegúrate de que el archivo
# se llame application-test.properties y activa el perfil "test".
# ─────────────────────────────────────────────────────────────────────────────

# 1. Forzar el tipo de aplicación a Servlet (Evita cualquier intento de WebFlux)
spring.main.web-application-type=servlet
  
  # 2. Desactivar Flyway completamente
spring.flyway.enabled=false
  
  # 3. EXCLUSIONES CRÍTICAS (Soluciona el error de "suitable driver class")
  # Al excluir estas clases, Spring dejará de buscar una URL de base de datos
  # y un Driver de PostgreSQL al arrancar el contexto.
spring.autoconfigure.exclude=\
org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,\
org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration,\
org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration
  
  # 4. Desactivar validaciones automáticas de JPA que requieran conexión
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ─────────────────────────────────────────────────────────────────────────────
# NOTA PARA EL FUTURO (PostgreSQL Real):
# Cuando quieras conectar a tu base de datos real, COMENTA las líneas de
# 'spring.autoconfigure.exclude' arriba y DESCOMENTA estas:
#
# spring.datasource.url=jdbc:postgresql://localhost:5432/tu_base_de_datos
# spring.datasource.username=postgres
# spring.datasource.password=tu_password
# spring.datasource.driver-class-name=org.postgresql.Driver
# spring.flyway.enabled=true
# ─────────────────────────────────────────────────────────────────────────────