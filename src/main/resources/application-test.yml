#       hibernate:
#         ddl-auto: create-drop
#     flyway:
#       enabled: false   ← Flyway sigue desactivado; Hibernate gestiona el schema en tests
#
# Alternativa recomendada para tests de integración reales: Testcontainers.
# Levanta un PostgreSQL real en Docker durante los tests, garantizando paridad con prod.
# ─────────────────────────────────────────────────────────────────────────────
