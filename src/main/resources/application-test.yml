# ─── Perfil: test ────────────────────────────────────────────────────────────
# Se activa con: SPRING_PROFILES_ACTIVE=test  o  @ActiveProfiles("test") en tests.
# Desactiva toda la infraestructura de base de datos para que los tests unitarios
# puedan ejecutarse sin necesidad de tener Docker levantado.
# ─────────────────────────────────────────────────────────────────────────────

spring:

  # ─── Flyway — desactivado en tests ─────────────────────────────────────────
  flyway:
    enabled: false
    # Los tests unitarios no deben ejecutar migraciones SQL. Flyway intenta
    # conectar a la BD al arrancar; sin BD disponible, el contexto Spring falla.

  # ─── Autoconfiguración — excluir componentes que necesitan BD ──────────────
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      # Sin esto, Spring Boot intenta crear un DataSource y falla si no hay BD.
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      # Depende del DataSource; si no se excluye, lanza BeanCreationException.
      - org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration
      # Capa de seguridad adicional: aunque flyway.enabled=false, esta exclusión
      # garantiza que el bean de Flyway ni siquiera se intenta crear.

# ─────────────────────────────────────────────────────────────────────────────
